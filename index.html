        <!-- Search Bar -->

            <input class="block w-full pl-10 pr-4 py-3 bg-[#232f48] border-none rounded-xl text-white placeholder-slate-400 focus:ring-2 focus:ring-primary text-sm" placeholder="搜尋遊戲..." type="text"/>

    <main class="px-4 pb-24">

            <button class="px-5 py-2 rounded-full bg-white/5 text-slate-300 text-sm font-medium hover:bg-white/10">動作</button>
            <button class="px-5 py-2 rounded-full bg-white/5 text-slate-300 text-sm font-medium hover:bg-white/10">益智</button>
        </div>
        
        <div class="flex flex-col gap-6">

            </div>

                    <div class="absolute inset-0 bg-gradient-to-t from-card-dark via-transparent to-transparent"></div>
                    <div class="absolute top-3 right-3 bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10">
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-accent-gold text-xs fill-1">star</span>
                            <span class="text-[10px] text-white font-bold">4.8</span>
                        </div>
                    </div>
                </div>
                <div class="p-5 flex items-center justify-between">
                    <div>
                        <h3 class="text-xl font-bold text-white mb-1 group-hover:text-primary transition-colors">貪食蛇</h3>
                        <p class="text-slate-400 text-sm font-medium">經典懷舊遊戲 · 適合所有年齡</p>
                    </div>
                    <a href="game.html" class="bg-primary hover:bg-primary/80 text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-all inline-flex items-center justify-center no-underline">

                    <div class="absolute inset-0 bg-gradient-to-t from-card-dark via-transparent to-transparent"></div>
                    <div class="absolute top-3 right-3 bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10">
                        <div class="flex items-center gap-1">
                            <span class="material-symbols-outlined text-accent-gold text-xs fill-1">star</span>
                            <span class="text-[10px] text-white font-bold">5.0</span>
                        </div>
                    </div>
                </div>
                <div class="p-5 flex items-center justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">星際撞地球</h3>
                        </div>
                        <p class="text-slate-400 text-sm font-medium">太空生存挑戰 · <span class="text-accent-gold/80 italic">刺激有趣</span></p>
                    </div>
                    <a href="index2.html" class="bg-primary hover:bg-primary/80 text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-all inline-flex items-center justify-center no-underline">
                        立即遊玩
                    </a>
                </div>
            </div>
            
            <!-- Footer Note -->
            <div class="py-8 text-center">
                <div class="inline-flex items-center gap-2 text-slate-500 text-xs font-bold uppercase tracking-widest">
                    <span class="material-symbols-outlined text-sm">auto_awesome</span>
                    更多遊戲即將推出
                </div>
            </div>
        </div>
    </main>
    
    <!-- iOS Style Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 glass-effect border-t border-white/5 px-6 pb-8 pt-3 flex items-center justify-between z-50">
        <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="text-[10px] font-bold uppercase">商店</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-primary">
            <span class="material-symbols-outlined fill-1">library_books</span>
            <span class="text-[10px] font-bold uppercase">遊戲庫</span>
            <div class="h-1 w-1 bg-primary rounded-full absolute -bottom-1"></div>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
            <span class="material-symbols-outlined">leaderboard</span>
            <span class="text-[10px] font-bold uppercase">社交</span>
        </button>
        <button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
            <span class="material-symbols-outlined">person</span>
            <span class="text-[10px] font-bold uppercase">個人</span>
        </button>
    </nav>
    
    <!-- Simple JavaScript for interactive elements -->
    <script>
        // Add click handlers for filter tabs
        document.querySelectorAll('.flex.gap-2.py-6 button').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all buttons
                document.querySelectorAll('.flex.gap-2.py-6 button').forEach(btn => {
                    btn.classList.remove('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
                    btn.classList.add('bg-white/5', 'text-slate-300', 'hover:bg-white/10');
                });
                
                // Add active class to clicked button
                this.classList.remove('bg-white/5', 'text-slate-300', 'hover:bg-white/10');
                this.classList.add('bg-primary', 'text-white', 'shadow-lg', 'shadow-primary/20');
            });
        });
        
        // Add click handlers for bottom navigation
        document.querySelectorAll('nav button').forEach(button => {
            button.addEventListener('click', function() {
                // Remove active class from all nav buttons
                document.querySelectorAll('nav button').forEach(btn => {
                    btn.classList.remove('text-primary');
                    btn.classList.add('text-slate-500', 'hover:text-white');
                    // Remove the indicator dot
                    const dot = btn.querySelector('.absolute.-bottom-1');
                    if (dot) dot.remove();
                });
                
                // Add active class to clicked button
                this.classList.remove('text-slate-500', 'hover:text-white');
                this.classList.add('text-primary');
                
                // Add indicator dot
                const dot = document.createElement('div');
                dot.className = 'h-1 w-1 bg-primary rounded-full absolute -bottom-1';
                this.appendChild(dot);
            });
        });
        
        // Search functionality (basic)
        const searchInput = document.querySelector('input[placeholder="搜尋遊戲..."]');
        searchInput.addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const gameCards = document.querySelectorAll('.group.relative.bg-card-dark');
            
            gameCards.forEach(card => {
                const title = card.querySelector('h3').textContent.toLowerCase();
                const description = card.querySelector('p').textContent.toLowerCase();
                
                if (title.includes(searchTerm) || description.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        });
    </script>
</body>
</html>
