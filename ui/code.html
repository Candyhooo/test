<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Game Library List</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    colors: {
                        "primary": "#1152d4",
                        "accent-gold": "#FFD700",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",

                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-effect {
            background: rgba(35, 47, 72, 0.7);
            backdrop-filter: blur(10px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 glass-effect border-b border-white/5 px-4 pt-12 pb-4">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full border-2 border-accent-gold overflow-hidden bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-accent-gold">sports_esports</span>
</div>
<div>
<h1 class="text-xl font-bold tracking-tight text-white">Game Center</h1>
<p class="text-xs text-accent-gold/80 font-medium">Candyheeeee's Hub</p>
</div>
</div>
<div class="flex gap-2">
<button class="size-10 flex items-center justify-center rounded-full bg-white/5 hover:bg-white/10 transition-colors">
<span class="material-symbols-outlined text-white text-[22px]">notifications</span>
</button>
</div>
</div>

<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

<button class="px-5 py-2 rounded-full bg-white/5 text-slate-300 text-sm font-medium hover:bg-white/10">Arcade</button>
<button class="px-5 py-2 rounded-full bg-white/5 text-slate-300 text-sm font-medium hover:bg-white/10">Action</button>
<button class="px-5 py-2 rounded-full bg-white/5 text-slate-300 text-sm font-medium hover:bg-white/10">Puzzle</button>
</div>
<div class="flex flex-col gap-6">
<div class="flex items-center justify-between">
<h2 class="text-lg font-bold text-white flex items-center gap-2">
<span class="w-1 h-5 bg-accent-gold rounded-full"></span>

<span class="text-xs text-slate-400 uppercase tracking-widest font-bold">2 Games</span>
</div>

<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-accent-gold text-xs fill-1">star</span>
<span class="text-[10px] text-white font-bold">4.8</span>
</div>
</div>
</div>
<div class="p-5 flex items-center justify-between">
<div>
<h3 class="text-xl font-bold text-white mb-1 group-hover:text-primary transition-colors">Snake</h3>
<p class="text-slate-400 text-sm font-medium">Good Fun</p>
</div>
<button class="bg-primary hover:bg-primary/80 text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-all">
                        Play Now
                    </button>
</div>
</div>

<div class="absolute inset-0 bg-gradient-to-t from-card-dark via-transparent to-transparent"></div>
<div class="absolute top-3 right-3 bg-black/40 backdrop-blur-md px-2 py-1 rounded-md border border-white/10">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-accent-gold text-xs fill-1">star</span>
<span class="text-[10px] text-white font-bold">5.0</span>
</div>
</div>
</div>
<div class="p-5 flex items-center justify-between">
<div>
<div class="flex items-center gap-2 mb-1">
<h3 class="text-xl font-bold text-white group-hover:text-primary transition-colors">Interstellar Strike</h3>
</div>
<p class="text-slate-400 text-sm font-medium">星際撞地球 · <span class="text-accent-gold/80 italic">Interesting</span></p>
</div>
<button class="bg-primary hover:bg-primary/80 text-white px-6 py-2.5 rounded-lg font-bold text-sm shadow-lg shadow-primary/30 active:scale-95 transition-all">

                    </button>
</div>
</div>
<!-- Footer Note -->
<div class="py-8 text-center">
<div class="inline-flex items-center gap-2 text-slate-500 text-xs font-bold uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">auto_awesome</span>

                </div>
</div>

<!-- iOS Style Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 glass-effect border-t border-white/5 px-6 pb-8 pt-3 flex items-center justify-between z-50">
<button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">grid_view</span>
<span class="text-[10px] font-bold uppercase">Store</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined fill-1">library_books</span>
<span class="text-[10px] font-bold uppercase">Library</span>
<div class="h-1 w-1 bg-primary rounded-full absolute -bottom-1"></div>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">leaderboard</span>
<span class="text-[10px] font-bold uppercase">Social</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-500 hover:text-white transition-colors">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase">Profile</span>
</button>
</nav>
